<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Exercises - PrepTreasure</title>
    <link rel="icon" type="image/png" href="logo.jpg">
	  <meta name="google-site-verification" content="ZTReLFgnwMXFIpRU289kSL_ZFm3DQTZLnLpkF6LS7l8" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9080292270571763" crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 25px; }
        
        .ex-grid { display: grid; gap: 15px; margin-top: 20px; }
        .ex-btn { 
            padding: 20px; border: 2px solid #FFD700; border-radius: 12px; background: white; 
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .ex-btn:hover { background: #FFD700; color: #333; transform: translateY(-3px); }
        
        #quiz-section { display: none; text-align: left; }
        .q-text { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #333; }
        .opt-btn { 
            display: block; width: 100%; padding: 15px; margin-bottom: 10px; 
            border: 2px solid #ddd; border-radius: 10px; background: #f9f9f9; 
            text-align: left; cursor: pointer; font-size: 16px; transition: 0.2s;
        }
        .opt-btn:disabled { cursor: default; }

        /* ఆన్సర్ రివీల్ స్టైల్స్ */
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        
        .explanation-box { 
            margin-top: 15px; padding: 15px; background: #e3f2fd; 
            border-left: 5px solid #2196f3; border-radius: 8px; font-size: 15px; display: none;
        }

        .next-btn { 
            display: none; width: 100%; padding: 15px; margin-top: 20px; 
            background: #1a1a1a; color: #FFD700; border: none; 
            border-radius: 10px; font-weight: bold; cursor: pointer;
        }
        
        #result-screen { display: none; padding: 20px; }
        .score-box { font-size: 40px; font-weight: bold; color: #28a745; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <div id="selection-screen">
            <h2 id="topic-title-disp">Select Your Exercise</h2>
            <p>Ready to test your knowledge?</p>
            <div class="ex-grid" id="exercise-buttons"></div>
            <br>
            <a href="user-home.html" style="color: #666; text-decoration: none;">← Back to Home</a>
        </div>

        <div id="quiz-section">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; color:#888;">
                <span id="progress-text">Question 1/10</span>
                <span id="exercise-name">Exercise</span>
            </div>
            <h3 id="q-text">Loading Question...</h3>
            <div id="options-area"></div>
            
            <div id="explanation-area" class="explanation-box"></div>
            <button id="next-q-btn" class="next-btn" onclick="nextQuestion()">Next Question ➡️</button>
        </div>

        <div id="result-screen">
            <h2>Exercise Completed! 🏆</h2>
            <div class="score-box" id="final-score">0/0</div>
            <p>Your score has been recorded.</p>
            <button onclick="location.reload()" style="padding:12px 25px; cursor:pointer; background:#FFD700; border:none; border-radius:8px; font-weight:bold;">Try Another Exercise</button>
            <br><br>
            <a href="user-home.html" style="text-decoration:none; color: #1a1a1a; font-weight:bold;">Back to Dashboard</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCppICsitxIJBSTV90DzYYS4oYv078QSiA",
            authDomain: "preptreasure.firebaseapp.com",
            projectId: "preptreasure",
            storageBucket: "preptreasure.firebasestorage.app",
            messagingSenderId: "354456239925",
            appId: "1:354456239925:web:814dd0bab357de6699d67c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const topicId = params.get("id");
        
        let questions = [];
        let currentQIndex = 0;
        let score = 0;

        async function setupSelection() {
            if(!topicId) return;
            const docSnap = await getDoc(doc(db, "topics", topicId));
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('topic-title-disp').innerText = data.topicTitle;
                const btnGrid = document.getElementById('exercise-buttons');
                btnGrid.innerHTML = "";
                for(let i=1; i<=5; i++){
                    const setKey = "ex"+i;
                    const name = i === 5 ? "Final Test 🎓" : "Exercise " + i;
                    if(data[setKey] && data[setKey].length > 0) {
                        const btn = document.createElement('button');
                        btn.className = "ex-btn";
                        btn.innerHTML = `<span>📝 ${name}</span> <span>→</span>`;
                        btn.onclick = () => startQuiz(data[setKey], name);
                        btnGrid.appendChild(btn);
                    }
                }
            }
        }

        function startQuiz(qSet, name) {
            questions = qSet;
            currentQIndex = 0;
            score = 0;
            document.getElementById('selection-screen').style.display = "none";
            document.getElementById('quiz-section').style.display = "block";
            document.getElementById('exercise-name').innerText = name;
            showQuestion();
        }

        function showQuestion() {
            if(currentQIndex >= questions.length) {
                finishQuiz();
                return;
            }

            const q = questions[currentQIndex];
            document.getElementById('progress-text').innerText = `Question ${currentQIndex + 1}/${questions.length}`;
            document.getElementById('q-text').innerText = q.q;
            
            const optionsArea = document.getElementById('options-area');
            optionsArea.innerHTML = "";
            document.getElementById('explanation-area').style.display = "none";
            document.getElementById('next-q-btn').style.display = "none";

            ["a", "b", "c", "d"].forEach(opt => {
                if(q[opt]) {
                    const btn = document.createElement('button');
                    btn.className = "opt-btn";
                    btn.id = "btn-" + opt;
                    btn.innerText = `${opt.toUpperCase()}. ${q[opt]}`;
                    btn.onclick = () => checkAnswer(opt, q.correct.toLowerCase());
                    optionsArea.appendChild(btn);
                }
            });
        }

        window.checkAnswer = (selected, correct) => {
            const allBtns = document.querySelectorAll('.opt-btn');
            allBtns.forEach(btn => btn.disabled = true); // ఆన్సర్ నొక్కాక మిగిలినవి లాక్ చేయడం

            const selectedBtn = document.getElementById("btn-" + selected);
            const correctBtn = document.getElementById("btn-" + correct);

            if (selected === correct) {
                score++;
                selectedBtn.classList.add("correct");
            } else {
                selectedBtn.classList.add("wrong");
                correctBtn.classList.add("correct"); // తప్పు నొక్కితే కరెక్ట్ ఆన్సర్ ని కూడా చూపిస్తుంది
            }

            // వివరణ చూపించడం
            const q = questions[currentQIndex];
            if(q.explanation) {
                const expBox = document.getElementById('explanation-area');
                expBox.innerHTML = "<strong>Explanation:</strong> " + q.explanation;
                expBox.style.display = "block";
            }

            document.getElementById('next-q-btn').style.display = "block";
        };

        window.nextQuestion = () => {
            currentQIndex++;
            showQuestion();
        };

        function finishQuiz() {
            document.getElementById('quiz-section').style.display = "none";
            document.getElementById('result-screen').style.display = "block";
            document.getElementById('final-score').innerText = `${score}/${questions.length}`;
        }

        setupSelection();
    </script>
</body>
</html>
