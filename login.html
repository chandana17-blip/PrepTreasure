<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PrepTreasure</title>
	  <meta name="google-site-verification" content="ZTReLFgnwMXFIpRU289kSL_ZFm3DQTZLnLpkF6LS7l8" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9080292270571763" crossorigin="anonymous"></script>
    <style>
        :root { --gold: #FFD700; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 360px; text-align: center; }
        .logo-text { font-size: 24px; font-weight: bold; color: var(--dark); margin-bottom: 20px; }
        .logo-text span { color: #f39c12; }
        
        input { width: 100%; padding: 14px; margin: 12px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-login { background: var(--gold); color: var(--dark); width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; transition: 0.3s; }
        .btn-login:hover { background: #e6c200; transform: translateY(-2px); }
        
        .links { margin-top: 25px; font-size: 14px; color: #666; }
        .links a { color: #f39c12; text-decoration: none; font-weight: bold; }
        .admin-link { margin-top: 15px; display: block; font-size: 12px; color: #999; text-decoration: none; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo-text">Prep<span>Treasure</span> 🛡️</div>
    <h3 style="margin-bottom: 20px; color: #444;">Welcome Back!</h3>
    
    <input type="number" id="login-phone" placeholder="Mobile Number (e.g. 91...)">
    <input type="password" id="login-pass" placeholder="Your Password">
    
    <button class="btn-login" id="login-btn">Login to Dashboard 🚀</button>
	<p style="font-size:12px;">Forgot Password? <a href="https://wa.me/916304555205" style="color:blue;">Contact Admin</a></p>
    
    <div class="links">
        New explorer? <a href="signup.html">Create Account</a>
        <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
        <a href="#" onclick="alert('దయచేసి మీ అడ్మిన్ నంబర్ మరియు పాస్‌వర్డ్ తో పైన లాగిన్ అవ్వండి. సిస్టమ్ మిమ్మల్ని ఆటోమేటిక్‌గా అడ్మిన్ డ్యాష్‌బోర్డ్‌కు తీసుకెళ్తుంది.')" class="admin-link">🛡️ Admin Access Information</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCppICsitxIJBSTV90DzYYS4oYv078QSiA",
        authDomain: "preptreasure.firebaseapp.com",
        projectId: "preptreasure",
        storageBucket: "preptreasure.firebasestorage.app",
        messagingSenderId: "354456239925",
        appId: "1:354456239925:web:814dd0bab357de6699d67c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('login-btn').onclick = async () => {
        const phone = document.getElementById('login-phone').value;
        const pass = document.getElementById('login-pass').value;

        if(!phone || !pass) return alert("Please enter both credentials!");

        try {
            const userRef = doc(db, "users", phone);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                const userData = userSnap.data();

                if (userData.password === pass) {
                    localStorage.setItem("user_name", userData.name);
                    localStorage.setItem("user_phone", phone);
                    localStorage.setItem("user_role", userData.role || "student");

                    alert("Login Successful! Welcome, " + userData.name);

                    // రోల్ ని బట్టి పేజీకి పంపడం
                    if (userData.role === "admin") {
                        window.location.href = "admin-dashboard.html";
                    } else {
                        window.location.href = "user-home.html";
                    }
                } else {
                    alert("Incorrect Password! Please try again.");
                }
            } else {
                alert("No account found with this number. Please Signup first!");
            }
        } catch (error) {
            alert("Error: " + error.message);
        }
    };
</script>
</body>
</html>
